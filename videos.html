<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Videos — Queen Empress Roland</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .videos-section {
      position: relative;
      z-index: 1;
      padding: 5rem 4rem;
      background: var(--cream);
    }

    /*
      ════════════════════════════════════
      HOW TO ADD VIDEOS:
      1. Go to your YouTube video
      2. Copy the ID from the URL after ?v=
      3. Replace VIDEO_ID_HERE with that ID
      4. Update the title below the embed
      5. Copy a .video-item block to add more
      ════════════════════════════════════
    */

    .video-item {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 4rem;
      align-items: center;
      padding: 3.5rem 0;
      border-bottom: 1px solid var(--border);
    }

    .video-item:last-child { border-bottom: none; }


    /* 16:9 responsive embed */
    .video-embed {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      background: var(--dark);
      flex-shrink: 0;
    }

    .video-embed iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }

    .video-info { display: flex; flex-direction: column; gap: 1rem; }

    .video-number {
      font-family: 'Cormorant Garamond', serif;
      font-size: 4rem;
      font-weight: 300;
      color: rgba(45,139,85,0.08);
      line-height: 1;
      margin-bottom: -0.5rem;
    }

    .video-type {
      font-family: 'Cinzel', serif;
      font-size: 0.62rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .video-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.8rem, 3vw, 2.5rem);
      font-weight: 300;
      font-style: italic;
      color: var(--dark);
      line-height: 1.1;
    }

    .video-year {
      font-size: 0.82rem;
      color: var(--text-light);
      letter-spacing: 0.1em;
    }

    .video-yt-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.78rem;
      color: var(--emerald);
      text-decoration: none;
      font-family: 'Jost', sans-serif;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--emerald-mid);
      padding-bottom: 2px;
      transition: all 0.3s;
      align-self: flex-start;
    }

    .video-yt-link:hover { color: var(--dark); border-color: var(--gold); }

    .channel-cta {
      margin-top: 4rem;
      padding-top: 3rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: center;
    }

    @media (max-width: 768px) {
      .videos-section { padding: 3rem 1.5rem; }

      .video-item,
      .video-item:nth-child(even) {
        grid-template-columns: 1fr;
        direction: ltr;
        gap: 1.5rem;
      }

      .video-number { font-size: 3rem; }
    }
  </style>
</head>
<body>

  <div class="page-hero videos">
    <p class="page-eyebrow">Watch</p>
    <h1 class="page-title">The <em>Videos</em></h1>
  </div>

  <section class="videos-section">

    <!-- VIDEO 1 -->
    <div class="video-item reveal">
      <div>
        <div class="video-embed">

            title="Queen Empress Roland"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen

      </div>
      <div class="video-info">

        <p class="video-year">2020</p>
        <a href="https://www.youtube.com/watch?v=lnDfx2dk7Bo" target="_blank" class="video-yt-link">
          Watch on YouTube
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14 21 3"/></svg>

    <!--
      To add more videos: copy any .video-item block above,

    -->

    <div class="channel-cta reveal">
